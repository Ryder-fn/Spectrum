name: Update JSON on Release

on:
  release:
    types: [published]
  workflow_dispatch: 

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main 
          fetch-depth: 0

      - name: Update update.json
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          
          URL="https://github.com/${{ github.repository }}/releases/download/${VERSION}/update.exe"
          
          jq --arg v "$VERSION" --arg u "$URL" '.version = $v | .url = $u' update.json > tmp.json && mv tmp.json update.json

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add update.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "Auto-update to ${ { github.event.release.tag_name } }"
          
          git push origin HEAD:main
